name: Instagram Reel -> monday.com

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the automation
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: python scripts/instagram_to_monday.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/processed_reels.json
          git diff --quiet --cached || git commit -m "Update processed reels state [skip ci]"
          git push
